<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>حرفي — غير متصل</title>
<style>
  html,body{margin:0;height:100%;background:#000;color:#fff;font-family:Tajawal,system-ui,-apple-system,sans-serif;}
  .wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
  .logo{width:96px;height:96px;border-radius:50%;border:3px solid #D4AF37;display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:900;color:#D4AF37;margin-bottom:24px;}
  h1{color:#D4AF37;font-size:24px;margin:0 0 12px;}
  p{color:#bbb;font-size:16px;line-height:1.7;max-width:320px;}
  button{margin-top:24px;background:#D4AF37;color:#000;border:0;padding:12px 28px;border-radius:14px;font-weight:700;font-size:15px;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">ح</div>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>تحقق من اتصالك بالإنترنت ثم أعد المحاولة.</p>
    <button onclick="location.reload()">إعادة المحاولة</button>
  </div>
</body>
</html>
